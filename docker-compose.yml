# Installing Kafka KRaft
services:
  kafka:                       # Name of the service inside Docker Compose
    restart: always             # Run Kafka automatically after reboot
    image: apache/kafka:latest  # Official Apache Kafka image
    container_name: kafka       # Name of the container 
    
    ports:
      - "9092:9092"             # Port for Kafka clients (producers/consumers)
      # - "9093:9093"             # Port for the KRaft controller (internal)
      - "9094:9094"             # For script on host (external)

    # Volumes are used to permanently store data
    volumes:
      - kafka_data:/var/lib/kafka/data

    environment:

      # Unique ID of this Kafka node in the KRaft cluster
      KAFKA_NODE_ID: "1"

      # This node acts as both broker and controller (single-node setup)
      KAFKA_PROCESS_ROLES: broker,controller

      # Listeners inside the container
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093
      
      # Spark will use 'kafka:9092' and PC script will use 'localhost:9094'
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9094

      # name of the listener used by Kafka for inter-broker communication
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      # Which listener is used by the KRaft
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # Mapping of listener names to security protocols
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT

      # KRaft quorum configuration (1 node cluster)
      # "broker" is the internal DNS name of this service
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@localhost:9093"

      # Replication settings for single-node mode
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"

      # Faster consumer group rebalancing
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"

      # Default number of partitions for new topics
      KAFKA_NUM_PARTITIONS: "3"

      # Create Kafka Topic
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    restart: always
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka

  spark-master:
    image: apache/spark:3.5.1
    container_name: spark-master
    restart: always
    user: root
    ports:
      - "8081:8080"     # Spark Master web UI
      - "7077:7077"     # Internal communication
    environment:
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./scripts:/opt/spark/scripts
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master

  spark-worker:
    image: apache/spark:3.5.1
    container_name: spark-worker
    restart: always
    user: root
    depends_on:
      - spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077

  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - postgres
    restart: always

# Kafka save its data (logs, segments, offsets) so that it does not disappear after restarting the container
volumes:
  kafka_data:
  postgres_data:
